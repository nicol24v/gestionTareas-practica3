name: CI/CD - Tests, Build y Deploy simulado

on:
  push:
    branches: [ main, ci-setup ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: taskdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_NAME: taskdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      SECRET_KEY: clave-secreta-para-ci

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar migraciones
        run: python manage.py migrate

      - name: Ejecutar tests
        run: python manage.py test

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Construir imagen Docker
        run: docker build -t gestion-tareas:latest .

      - name: Guardar imagen como artefacto
        run: docker save gestion-tareas:latest | gzip > imagen-docker.tar.gz

      - name: Subir artefacto a GitHub
        uses: actions/upload-artifact@v4
        with:
          name: imagen-docker
          path: imagen-docker.tar.gz

  deploy-simulado:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Simular despliegue
        run: |
          mkdir -p /tmp/deploy
          cp -r . /tmp/deploy/
          echo "Proyecto copiado a /tmp/deploy"
          echo "Simulación: docker-compose up -d"
          echo "Despliegue simulado completado exitosamente"